name: Release controller scaffold

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (empty = per-run bootstrap tag)
        required: false
        default: ""
      ttl_seconds:
        description: Lease TTL seconds
        required: true
        default: "900"
      mode:
        description: attest/draft mode
        required: true
        default: live
        type: choice
        options:
          - dry-run
          - live

permissions: {}

jobs:
  admit-and-lease:
    name: Admit and lease (evidence store only)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    env:
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}
      B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      DPONE_CONTROLLER_WORKFLOW_ID: "316322127"
      GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
    steps:
      - name: Checkout controller only
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          TAG='${{ inputs.tag }}'
          if [ -z "$TAG" ]; then
            TAG="v0.0.0-shape-b-bootstrap-${GITHUB_RUN_ID}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "leasing tag=$TAG"
      - name: Acquire publication lease in B2 WORM store
        run: |
          set -euo pipefail
          python3 tools/evidence/release_evidence_cli.py acquire-lease \
            --tag "${{ steps.tag.outputs.tag }}" \
            --repository-id 1255975556 \
            --ttl-seconds "${{ inputs.ttl_seconds }}" \
            --retention-days 365 \
            | tee lease-receipt.json
      - name: Mint target App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DPONE_RELEASE_APP_ID }}
          private-key: ${{ secrets.DPONE_RELEASE_APP_PRIVATE_KEY }}
          owner: PaulKov
          repositories: dpone
      - name: Capture bootstrap Snapshot A
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          python3 tools/evidence/release_evidence_cli.py capture-snapshot-a \
            --tag "${{ steps.tag.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --owner PaulKov \
            --repo dpone \
            --snapshot-gap-seconds 5 \
            | tee snapshot-a-receipt.json
      - name: Upload lease receipt artifact
        uses: actions/upload-artifact@v4
        with:
          name: lease-receipt
          path: |
            lease-receipt.json
            snapshot-a-receipt.json

  attest-and-draft:
    name: Attest and draft
    needs: admit-and-lease
    runs-on: ubuntu-latest
    environment: release-attest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}
      B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      DPONE_CONTROLLER_WORKFLOW_ID: "316322127"
      DPONE_CONTROLLER_ENVIRONMENT: release-attest
      GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
    steps:
      - name: Checkout controller only
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Dry-run receipts only
        if: ${{ inputs.mode == 'dry-run' }}
        run: |
          set -euo pipefail
          python3 tools/evidence/release_evidence_cli.py attest-draft-dry-run \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --bootstrap-dist \
            | tee attest-draft-receipt.json

      - name: Build bootstrap subject
        if: ${{ inputs.mode == 'live' }}
        id: subject
        run: |
          set -euo pipefail
          TAG='${{ needs.admit-and-lease.outputs.tag }}'
          mkdir -p dist
          SUBJECT="dist/dpone-${TAG}-shape-b-bootstrap.bin"
          printf 'dpone-shape-b-bootstrap\ntag=%s\nrun=%s\n' "$TAG" "${GITHUB_RUN_ID}" > "$SUBJECT"
          echo "path=$SUBJECT" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$SUBJECT")" >> "$GITHUB_OUTPUT"

      - name: Attest bootstrap subject
        if: ${{ inputs.mode == 'live' }}
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.subject.outputs.path }}

      - name: Mint target App token
        if: ${{ inputs.mode == 'live' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DPONE_RELEASE_APP_ID }}
          private-key: ${{ secrets.DPONE_RELEASE_APP_PRIVATE_KEY }}
          owner: PaulKov
          repositories: dpone

      - name: Stage live draft + LIVE receipts
        if: ${{ inputs.mode == 'live' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          BUNDLE='${{ steps.attest.outputs.bundle-path }}'
          if [ -z "$BUNDLE" ] || [ ! -f "$BUNDLE" ]; then
            echo "attestation bundle missing" >&2
            exit 1
          fi
          python3 tools/evidence/release_evidence_cli.py stage-draft-live \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --owner PaulKov \
            --repo dpone \
            --subject-file "${{ steps.subject.outputs.path }}" \
            --attestation-bundle "$BUNDLE" \
            --attestation-url "${{ steps.attest.outputs.attestation-url }}" \
            | tee attest-draft-receipt.json

      - name: Upload attest-draft receipt artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attest-draft-receipt
          path: attest-draft-receipt.json
          if-no-files-found: ignore

  authorize-publication:
    name: Snapshot B + AUTHORIZED (bootstrap)
    needs:
      - admit-and-lease
      - attest-and-draft
    if: ${{ inputs.mode == 'live' }}
    runs-on: ubuntu-latest
    environment: release-attest
    permissions:
      contents: read
    env:
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}
      B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      DPONE_CONTROLLER_WORKFLOW_ID: "316322127"
      DPONE_CONTROLLER_ENVIRONMENT: release-attest
      GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
    steps:
      - name: Checkout controller only
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Mint target App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DPONE_RELEASE_APP_ID }}
          private-key: ${{ secrets.DPONE_RELEASE_APP_PRIVATE_KEY }}
          owner: PaulKov
          repositories: dpone
      - name: Authorize publication (bootstrap Snapshot B)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # Bootstrap only: two-read protected-base tip; no PASS/GO; no PyPI/publish.
          python3 tools/evidence/release_evidence_cli.py authorize-publication \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --owner PaulKov \
            --repo dpone \
            --snapshot-gap-seconds 5 \
            | tee authorize-receipt.json
      - name: Upload authorize receipt artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authorize-receipt
          path: authorize-receipt.json
          if-no-files-found: ignore

  observe-publication:
    name: Observe PyPI + immutable releases (no mutation)
    needs:
      - admit-and-lease
      - authorize-publication
    if: ${{ inputs.mode == 'live' }}
    runs-on: ubuntu-latest
    environment: release-attest
    permissions:
      contents: read
    env:
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}
      B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      DPONE_CONTROLLER_WORKFLOW_ID: "316322127"
      DPONE_CONTROLLER_ENVIRONMENT: release-attest
      GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
    steps:
      - name: Checkout controller only
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Mint target App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DPONE_RELEASE_APP_ID }}
          private-key: ${{ secrets.DPONE_RELEASE_APP_PRIVATE_KEY }}
          owner: PaulKov
          repositories: dpone
      - name: PyPI inventory observe (never upload)
        run: |
          set -euo pipefail
          # Read-only JSON classify; no Trusted Publisher; no twine/upload.
          python3 tools/evidence/release_evidence_cli.py pypi-inventory-observe \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            | tee pypi-inventory-receipt.json
      - name: Immutable-release inventory observe (never enable)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # Org settings endpoint may 404 for user-owned accounts → UNVERIFIED.
          python3 tools/evidence/release_evidence_cli.py immutable-inventory-observe \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --owner PaulKov \
            --repo dpone \
            | tee immutable-inventory-receipt.json

      - name: Trusted Publisher inventory observe (never rebind)
        run: |
          set -euo pipefail
          # Integrity publisher claims only; no TP management API; no rebind.
          python3 tools/evidence/release_evidence_cli.py trusted-publisher-inventory-observe \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            | tee trusted-publisher-inventory-receipt.json

      - name: Draft inventory observe (never publish)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # Exact draft ID re-read only; never PATCH draft=false / publish.
          python3 tools/evidence/release_evidence_cli.py draft-inventory-observe \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --owner PaulKov \
            --repo dpone \
            | tee draft-inventory-receipt.json
      - name: Upload observe receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observe-publication-receipts
          path: |
            pypi-inventory-receipt.json
            immutable-inventory-receipt.json
            trusted-publisher-inventory-receipt.json
            draft-inventory-receipt.json
          if-no-files-found: ignore

  release-lease:
    name: Release lease (bootstrap cleanup)
    needs:
      - admit-and-lease
      - authorize-publication
      - observe-publication
    if: ${{ inputs.mode == 'live' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}
      B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      DPONE_CONTROLLER_WORKFLOW_ID: "316322127"
      DPONE_CONTROLLER_ENVIRONMENT: none
      GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
    steps:
      - name: Checkout controller only
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Append LEASE_RELEASED
        run: |
          set -euo pipefail
          # Ends the active lease without deleting drafts/tags/public state.
          python3 tools/evidence/release_evidence_cli.py release-lease \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --reason BOOTSTRAP_COMPLETE \
            | tee lease-release-receipt.json
      - name: Upload lease-release receipt artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lease-release-receipt
          path: lease-release-receipt.json
          if-no-files-found: ignore
