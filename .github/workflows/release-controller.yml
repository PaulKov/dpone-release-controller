name: Release controller scaffold

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  admit-dry-run:
    name: Admit dry-run (no mutation)
    runs-on: ubuntu-latest
    steps:
      - name: Record controller identity
        run: |
          set -euo pipefail
          cat <<JSON
          {
            "status": "SCAFFOLD_NOT_ACTIVATED",
            "controller_repository": "${{ github.repository }}",
            "controller_repository_id": "${{ github.repository_id }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "sha": "${{ github.sha }}",
            "target_repository": "PaulKov/dpone",
            "target_repository_id": 1255975556
          }
          JSON
