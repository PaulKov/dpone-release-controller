name: Release controller scaffold

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (empty = per-run bootstrap tag)
        required: false
        default: ""
      ttl_seconds:
        description: Lease TTL seconds
        required: true
        default: "300"
      mode:
        description: attest/draft mode
        required: true
        default: live
        type: choice
        options:
          - dry-run
          - live

permissions: {}

jobs:
  admit-and-lease:
    name: Admit and lease (evidence store only)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    env:
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}
      B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      DPONE_CONTROLLER_WORKFLOW_ID: "316322127"
      GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
    steps:
      - name: Checkout controller only
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          TAG='${{ inputs.tag }}'
          if [ -z "$TAG" ]; then
            TAG="v0.0.0-shape-b-bootstrap-${GITHUB_RUN_ID}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "leasing tag=$TAG"
      - name: Acquire publication lease in B2 WORM store
        run: |
          set -euo pipefail
          python3 tools/evidence/release_evidence_cli.py acquire-lease \
            --tag "${{ steps.tag.outputs.tag }}" \
            --repository-id 1255975556 \
            --ttl-seconds "${{ inputs.ttl_seconds }}" \
            --retention-days 365 \
            | tee lease-receipt.json
      - name: Upload lease receipt artifact
        uses: actions/upload-artifact@v4
        with:
          name: lease-receipt
          path: lease-receipt.json

  attest-and-draft:
    name: Attest and draft
    needs: admit-and-lease
    runs-on: ubuntu-latest
    environment: release-attest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}
      B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
      DPONE_CONTROLLER_WORKFLOW_ID: "316322127"
      DPONE_CONTROLLER_ENVIRONMENT: release-attest
      GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
    steps:
      - name: Checkout controller only
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Dry-run receipts only
        if: ${{ inputs.mode == 'dry-run' }}
        run: |
          set -euo pipefail
          python3 tools/evidence/release_evidence_cli.py attest-draft-dry-run \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --bootstrap-dist \
            | tee attest-draft-receipt.json

      - name: Build bootstrap subject
        if: ${{ inputs.mode == 'live' }}
        id: subject
        run: |
          set -euo pipefail
          TAG='${{ needs.admit-and-lease.outputs.tag }}'
          mkdir -p dist
          SUBJECT="dist/dpone-${TAG}-shape-b-bootstrap.bin"
          printf 'dpone-shape-b-bootstrap\ntag=%s\nrun=%s\n' "$TAG" "${GITHUB_RUN_ID}" > "$SUBJECT"
          echo "path=$SUBJECT" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$SUBJECT")" >> "$GITHUB_OUTPUT"

      - name: Attest bootstrap subject
        if: ${{ inputs.mode == 'live' }}
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.subject.outputs.path }}

      - name: Mint target App token
        if: ${{ inputs.mode == 'live' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DPONE_RELEASE_APP_ID }}
          private-key: ${{ secrets.DPONE_RELEASE_APP_PRIVATE_KEY }}
          owner: PaulKov
          repositories: dpone

      - name: Stage live draft + LIVE receipts
        if: ${{ inputs.mode == 'live' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          BUNDLE='${{ steps.attest.outputs.bundle-path }}'
          if [ -z "$BUNDLE" ] || [ ! -f "$BUNDLE" ]; then
            echo "attestation bundle missing" >&2
            exit 1
          fi
          python3 tools/evidence/release_evidence_cli.py stage-draft-live \
            --tag "${{ needs.admit-and-lease.outputs.tag }}" \
            --repository-id 1255975556 \
            --retention-days 365 \
            --owner PaulKov \
            --repo dpone \
            --subject-file "${{ steps.subject.outputs.path }}" \
            --attestation-bundle "$BUNDLE" \
            --attestation-url "${{ steps.attest.outputs.attestation-url }}" \
            | tee attest-draft-receipt.json

      - name: Upload attest-draft receipt artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attest-draft-receipt
          path: attest-draft-receipt.json
          if-no-files-found: ignore
